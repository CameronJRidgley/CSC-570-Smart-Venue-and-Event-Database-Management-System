services:
  postgres:
    image: postgres:16
    container_name: event_mgmt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_mgmt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: event_mgmt_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: event_mgmt_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/event_mgmt
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB_NAME: event_mgmt
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      JWT_SECRET: change-me-in-production-please
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    # Uncomment to auto-run migrations on startup once initial revision exists:
    # command: >
    #   sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
  mongo_data:
